name: cimsohackathongolfbooking
description: A Flutter application for Pioneer Golf Club.

publish_to: 'none' # Remove this line if you want to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.19.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.1.10
  image_picker: ^1.0.4
  flutter_map: ^5.0.0 # For map functionality
  latlong2: ^0.9.0 # For latitude and longitude calculations
  country_code_picker: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/